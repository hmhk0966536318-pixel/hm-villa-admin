<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>住宿管理｜禾渼智慧管理中心</title><link rel="stylesheet" href="css/style.css"/></head><body class="app-page orders-page"><header class="page-header"><button class="back-btn" onclick="location.href='index.html'">← 回首頁</button><h1>📋 住宿管理</h1></header><section class="quick-bar"><button class="active" onclick="filterOrders('全部')">全部</button><button onclick="filterOrders('待收訂')">待收訂</button><button onclick="filterOrders('已收訂')">已收訂</button><button onclick="filterOrders('已入住')">已入住</button><button onclick="filterOrders('已退房')">已退房</button><button onclick="filterOrders('已取消')">已取消</button></section><button class="primary-btn full-btn" onclick="openAddOrderSheet()">➕ 新增訂單</button><main id="orderList" class="order-list"><div class="info-card">訂單讀取中...</div></main><div id="sheetOverlay" class="sheet-overlay" onclick="closeAllSheets()"></div><section id="orderSheet" class="day-sheet"><div class="sheet-handle"></div><div class="sheet-head"><div><div id="orderTitle" class="sheet-title">訂單資料</div><div id="orderSub" class="sheet-sub"></div></div><button class="sheet-close" onclick="closeAllSheets()">×</button></div><div id="orderContent"></div></section><section id="addOrderSheet" class="day-sheet"><div class="sheet-handle"></div><div class="sheet-head"><div><div class="sheet-title">➕ 新增訂單</div><div class="sheet-sub">豪華版 V5.2</div></div><button class="sheet-close" onclick="closeAllSheets()">×</button></div><form id="addOrderForm" onsubmit="submitAddOrder(event)"><div class="form-section"><div class="form-section-title">👤 訂房人資料</div><div class="form-grid"><label>姓名<input name="name" required placeholder="例如：李先生"/></label><label>電話<input name="phone" inputmode="tel"/></label><label>來源<select name="source"><option value="LINE">LINE</option><option value="Facebook">Facebook</option><option value="Threads">Threads</option><option value="電話">電話</option><option value="官網">官網</option><option value="Booking">Booking</option><option value="Agoda">Agoda</option><option value="其他">其他</option></select></label></div></div><div class="form-section"><div class="form-section-title">📅 入住資訊</div><div class="form-grid"><label>入住日期<input name="checkIn" type="date" required onchange="updateSmartInfo()"/></label><label>退房日期<input name="checkOut" type="date"/></label><label>房型<select name="roomType" required onchange="updateSmartInfo()"><option value="包棟">🏡 包棟</option><option value="201">🛏 201 四人房</option><option value="202">🛏 202 二大一小</option><option value="203">🛏 203 二大二小</option><option value="301">🛏 301 四人房</option><option value="302">🛏 302 二大二小</option></select></label><label>大人<input name="adult" type="number" min="0" oninput="updateSmartInfo()"/></label><label>小孩<input name="child" type="number" min="0" oninput="updateSmartInfo()"/></label></div><div class="smart-row"><div class="smart-card" id="roomHint">🏡 包棟</div><div class="smart-card" id="peopleHint">入住 0 人</div></div></div><div class="form-section"><div class="form-section-title">💰 金額資訊</div><div class="form-grid"><label>總金額<input name="total" type="number" min="0" oninput="autoDeposit()"/></label><label>應收訂金<input name="depositDue" type="number" min="0"/></label><label>已收訂金<input name="depositPaid" type="number" min="0"/></label><label>後五碼<input name="last5" maxlength="5"/></label></div></div><div class="form-section"><div class="form-section-title">📌 訂單狀態</div><div class="status-options"><label class="status-option"><input type="radio" name="status" value="待收訂" checked/><span>🟡 待收訂</span></label><label class="status-option"><input type="radio" name="status" value="已收訂"/><span>🟢 已收訂</span></label><label class="status-option"><input type="radio" name="status" value="已確認"/><span>✅ 已確認</span></label></div></div><div class="form-section"><div class="form-section-title">📝 備註</div><div class="form-grid"><label class="full-label">備註<textarea name="note" rows="4"></textarea></label></div></div><button id="saveOrderBtn" class="primary-btn full-btn" type="submit">💾 儲存訂單</button></form></section><div id="toast" class="toast"></div><script src="js/orders.js"></script></body></html>
