<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>房況日曆｜禾渼智慧管理中心</title><link rel="stylesheet" href="css/style.css"/></head><body class="app-page calendar-page"><header class="page-header"><button class="back-btn" onclick="location.href='index.html'">← 回首頁</button><h1>📅 房況日曆</h1></header><section class="quick-bar"><button onclick="goToday()">今天</button><button onclick="goTomorrow()">明天</button><button onclick="goThisSaturday()">本週六</button><button onclick="goNextSaturday()">下週六</button></section><section class="month-bar"><button onclick="changeMonth(-1)">◀</button><h2 id="monthTitle">讀取中</h2><button onclick="changeMonth(1)">▶</button></section><section class="legend"><span>🟢 可售</span><span>🟡 僅接包棟</span><span>🔴 已售</span><span>⚫ 關閉</span></section><section class="week"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></section><main id="calendar" class="calendar"><div class="info-card">房況讀取中...</div></main><div id="sheetOverlay" class="sheet-overlay" onclick="closeDaySheet()"></div><section id="daySheet" class="day-sheet"><div class="sheet-handle"></div><div class="sheet-head"><div><div id="sheetDate" class="sheet-title">日期</div><div id="sheetSub" class="sheet-sub">房況資訊</div></div><button class="sheet-close" onclick="closeDaySheet()">×</button></div><div class="info-card"><div class="label">🏡 包棟</div><div id="villaStatus" class="big-status">讀取中</div><div id="villaDesc" class="desc"></div></div><div class="info-card"><div class="label">📅 日期類型</div><div id="dateTypeText">未設定</div></div><div class="info-card"><div class="label">📝 備註</div><div id="noteText">無</div></div><div class="info-card muted-card"><div class="label">🛏 單間</div><div class="desc">下一版接訂單表，顯示 201～302 真正可售狀態。</div></div></section><script src="js/calendar.js"></script></body></html>
